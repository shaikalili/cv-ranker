version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cv-ranker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cvranker
      POSTGRES_PASSWORD: cvranker
      POSTGRES_DB: cvranker
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cvranker -d cvranker']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cv-ranker-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '3000:3000'
    environment:
      # Postgres runs in the `postgres` service above; hostname is the service name.
      DATABASE_URL: postgresql://cvranker:cvranker@postgres:5432/cvranker?schema=public
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-development}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      AI_MODEL_CHEAP: ${AI_MODEL_CHEAP:-gpt-5-mini}
      AI_MODEL_PREMIUM: ${AI_MODEL_PREMIUM:-gpt-5.1}
      AI_CONCURRENCY_LIMIT: ${AI_CONCURRENCY_LIMIT:-5}
      CV_GENERATION_CONCURRENCY_LIMIT: ${CV_GENERATION_CONCURRENCY_LIMIT:-10}
      # pino log level: fatal|error|warn|info|debug|trace
      # Raw LLM payloads are emitted at `trace` and redacted for PII.
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - ./backend/test:/app/test
      - /app/node_modules
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npx prisma db seed && npm run start:dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cv-ranker-frontend
    restart: unless-stopped
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
    volumes:
      - ./frontend/src:/app/src
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
